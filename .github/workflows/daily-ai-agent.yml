name: AI Agent & Skills 每日情报简报

on:
  schedule:
    - cron: '0 0 * * *'   # 每天 UTC 0:00 = HKT 早上 8:00
  workflow_dispatch:      # 允许手动测试

jobs:
  generate:
    runs-on: ubuntu-latest

    # 核心权限声明
    permissions:
      contents: read # 读取仓库代码（用于 checkout）
      issues: write # 写ISSUE
      packages: read # 读取 Docker 镜像（用于拉取 RSSHub 镜像）
      
    steps:
      - uses: actions/checkout@v4

      # 启动 RSSHub 服务（容器权限）
      - name: Start RSSHub Service
        run: |
          docker run -d --name rsshub \
            -p 1200:1200 \
            diygod/rsshub:latest
          
      # 等待RSSHub服务启动
      - name: Wait for RSSHub
        run: |
          until curl -f http://localhost:1200; do
            sleep 1
          done

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install feedparser requests openai

      - name: 生成并推送每日总结
        env:
          API_KEY: ${{ secrets.ALIYUN_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python aliyun_daily_summary.py
